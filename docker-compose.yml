services:
  qdrant:
    image: qdrant/qdrant:v1.15.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      LYRICMOOD_QDRANT_URL: http://qdrant:6333
    volumes:
      - ./models:/app/models:ro
      - ./data/processed:/app/data/processed:ro
    depends_on:
      - qdrant

  # All UI users reach the api from the same container IP, so they share ONE
  # per-IP rate-limit bucket (LYRICMOOD_RATE_LIMIT, default 30/min). Each
  # analysis is ~2 API calls (/v1/predict + /v1/similar), so the default allows
  # roughly 15 analyses/min across everyone behind this ui. For multi-user demos,
  # raise LYRICMOOD_RATE_LIMIT on the api service above.
  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    ports:
      - "8501:8501"
    environment:
      LYRICMOOD_API_URL: http://api:8000
    depends_on:
      - api

volumes:
  qdrant_storage:
